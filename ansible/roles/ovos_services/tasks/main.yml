---
- name: Include assert.yml
  ansible.builtin.import_tasks: assert.yml
  tags:
    - always

- name: Include systemd uninstall tasks
  ansible.builtin.import_tasks: uninstall.yml
  when:
    - ovos_services_is_cleaning | bool
    - ansible_facts.system == 'Linux'
    - ovos_services_manager == 'systemd'
  tags:
    - uninstall

- name: Include launchd uninstall tasks
  ansible.builtin.import_tasks: uninstall-launchd.yml
  when:
    - ovos_services_is_cleaning | bool
    - ansible_facts.system == 'Darwin'
    - ovos_services_manager == 'launchd'
  tags:
    - uninstall

- name: Include install tasks
  ansible.builtin.import_tasks: install.yml
  when: not (ovos_services_is_cleaning | bool)
