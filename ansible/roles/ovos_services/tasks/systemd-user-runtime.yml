---
- name: Enable lingering for {{ ovos_installer_user }}
  ansible.builtin.command: "{{ ovos_services_enable_linger_cmd }}"
  changed_when: false
  failed_when: false
  when: ovos_services_manage_linger | default(true) | bool

- name: Ensure /run/user exists for {{ ovos_installer_uid }}
  ansible.builtin.file:
    path: "{{ ovos_services_user_runtime_dir }}"
    state: directory
    owner: "{{ ovos_installer_user }}"
    group: "{{ ovos_installer_group }}"
    mode: "{{ ovos_services_user_runtime_mode }}"

- name: Ensure user systemd instance is running
  ansible.builtin.systemd_service:
    name: "{{ ovos_services_user_systemd_unit }}"
    state: started
  failed_when: false
  changed_when: false

- name: Probe user systemd availability  # noqa command-instead-of-module
  become: true
  become_user: "{{ ovos_installer_user }}"
  environment: "{{ ovos_services_user_bus_environment }}"
  ansible.builtin.command: systemctl --user show-environment
  register: ovos_services_user_systemd_probe
  changed_when: false
  failed_when: false

- name: Set user systemd availability fact
  ansible.builtin.set_fact:
    ovos_services_user_systemd_available: "{{ ovos_services_user_systemd_probe.rc | default(1) == 0 }}"
