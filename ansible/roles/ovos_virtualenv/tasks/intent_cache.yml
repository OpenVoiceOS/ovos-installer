---
- name: Checkout padatious cache repository
  ansible.builtin.git:
    repo: "{{ ovos_virtualenv_padatious_cache_repo_url }}"
    version: "{{ ovos_virtualenv_padatious_cache_repo_version }}"
    dest: "{{ ovos_virtualenv_padatious_cache_repo_path }}"
    update: true
    force: true
    depth: 1

- name: Ensure OVOS intent cache parent directory exists
  ansible.builtin.file:
    path: "{{ ovos_virtualenv_padatious_cache_dir | dirname }}"
    state: directory
    owner: "{{ ovos_installer_user }}"
    group: "{{ ovos_installer_group }}"
    mode: "0755"

- name: Check staged OVOS intent cache payload exists
  ansible.builtin.stat:
    path: "{{ ovos_virtualenv_padatious_cache_repo_path }}/intent_cache"
  register: ovos_virtualenv_padatious_cache_payload
  changed_when: false

- name: Assert staged OVOS intent cache payload is valid
  ansible.builtin.assert:
    that:
      - ovos_virtualenv_padatious_cache_payload.stat.exists | default(false)
      - ovos_virtualenv_padatious_cache_payload.stat.isdir | default(false)
    fail_msg: >-
      Missing or invalid padatious_cache payload at
      {{ ovos_virtualenv_padatious_cache_repo_path }}/intent_cache.

- name: Remove stale staged OVOS intent cache directory
  ansible.builtin.file:
    path: "{{ ovos_virtualenv_padatious_cache_staging_dir }}"
    state: absent

- name: Stage OVOS intent cache payload from padatious_cache
  ansible.builtin.command:
    argv:
      - cp
      - -a
      - "{{ ovos_virtualenv_padatious_cache_repo_path }}/intent_cache"
      - "{{ ovos_virtualenv_padatious_cache_staging_dir }}"
  changed_when: true

- name: Check whether current OVOS intent cache exists
  ansible.builtin.stat:
    path: "{{ ovos_virtualenv_padatious_cache_dir }}"
  register: ovos_virtualenv_existing_intent_cache
  changed_when: false

- name: Remove previous OVOS intent cache backup directory
  ansible.builtin.file:
    path: "{{ ovos_virtualenv_padatious_cache_backup_dir }}"
    state: absent
  when: ovos_virtualenv_existing_intent_cache.stat.exists | default(false)

- name: Backup existing OVOS intent cache directory
  ansible.builtin.command:
    argv:
      - mv
      - "{{ ovos_virtualenv_padatious_cache_dir }}"
      - "{{ ovos_virtualenv_padatious_cache_backup_dir }}"
  changed_when: true
  when: ovos_virtualenv_existing_intent_cache.stat.exists | default(false)

- name: Activate staged OVOS intent cache directory
  ansible.builtin.command:
    argv:
      - mv
      - "{{ ovos_virtualenv_padatious_cache_staging_dir }}"
      - "{{ ovos_virtualenv_padatious_cache_dir }}"
  changed_when: true

- name: Ensure OVOS intent cache ownership is correct
  ansible.builtin.file:
    path: "{{ ovos_virtualenv_padatious_cache_dir }}"
    state: directory
    owner: "{{ ovos_installer_user }}"
    group: "{{ ovos_installer_group }}"
    recurse: true
