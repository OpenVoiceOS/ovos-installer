---
- name: Enable CRB repository
  ansible.builtin.command:
    cmd: dnf config-manager --enable crb
  changed_when: false
  when:
    - ansible_facts.os_family == "RedHat"
    - ansible_facts.distribution != "Fedora"

- name: Add EPEL repository
  ansible.builtin.dnf:
    name: epel-release
  when:
    - ansible_facts.os_family == "RedHat"
    - ansible_facts.distribution != "Fedora"

- name: Prepare tracked virtualenv package ownership (Debian family)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_virtualenv_packages_debian }}"
  when: ansible_facts.os_family == "Debian"

- name: Handle virtualenv package requirements (ovos/hivemind) on Debian family
  ansible.builtin.apt:
    name: "{{ ovos_virtualenv_packages_debian }}"
    install_recommends: false
    state: present
  register: ovos_virtualenv_package_install_result
  when: ansible_facts.os_family == "Debian"

- name: Persist tracked virtualenv package ownership (Debian family)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
  when: ansible_facts.os_family == "Debian"

- name: Prepare tracked virtualenv package ownership (RedHat)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_virtualenv_packages_redhat }}"
  when: ansible_facts.os_family == "RedHat"

- name: Handle virtualenv package requirements (ovos/hivemind) on RedHat
  ansible.builtin.dnf:
    name: "{{ ovos_virtualenv_packages_redhat }}"
    state: present
  register: ovos_virtualenv_package_install_result
  when: ansible_facts.os_family == "RedHat"

- name: Persist tracked virtualenv package ownership (RedHat)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
  when: ansible_facts.os_family == "RedHat"

- name: Prepare tracked virtualenv package ownership (SUSE)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_virtualenv_packages_suse }}"
  when: ansible_facts.os_family == "Suse"

- name: Handle virtualenv package requirements (ovos/hivemind) on SUSE
  community.general.zypper:
    name: "{{ ovos_virtualenv_packages_suse }}"
    state: present
  register: ovos_virtualenv_package_install_result
  when: ansible_facts.os_family == "Suse"

- name: Persist tracked virtualenv package ownership (SUSE)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
  when: ansible_facts.os_family == "Suse"

- name: Prepare tracked virtualenv package ownership (Archlinux)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_virtualenv_packages_arch_tracked }}"
  when: ansible_facts.os_family == "Archlinux"

- name: Handle virtualenv package requirements (ovos/hivemind) on Archlinux
  community.general.pacman:
    name: "{{ ovos_virtualenv_packages_arch }}"
    state: present
  register: ovos_virtualenv_package_install_result
  when: ansible_facts.os_family == "Archlinux"

- name: Check Xcode Command Line Tools installation (macOS)
  ansible.builtin.command:
    cmd: xcode-select -p
  register: ovos_virtualenv_macos_clt
  changed_when: false
  failed_when: false
  when: ansible_facts.system == "Darwin"

- name: Assert Xcode Command Line Tools are installed (macOS)
  ansible.builtin.assert:
    that:
      - ovos_virtualenv_macos_clt.rc == 0
    fail_msg: >-
      Xcode Command Line Tools are required on macOS. Run 'xcode-select --install'
      and rerun the installer.
  when: ansible_facts.system == "Darwin"

- name: Prepare tracked virtualenv package ownership (macOS)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_macos.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_macos }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_virtualenv_macos_packages }}"
    ovos_installer_package_tracking_homebrew_path: "{{ ovos_virtualenv_homebrew_path }}"
  when: ansible_facts.system == "Darwin"

- name: Handle virtualenv package requirements (ovos/hivemind) on macOS
  become: true
  become_user: "{{ ovos_installer_user }}"
  community.general.homebrew:
    name: "{{ ovos_virtualenv_macos_packages }}"
    state: present
    path: "{{ ovos_virtualenv_homebrew_path }}"
    update_homebrew: false
  register: ovos_virtualenv_package_install_result
  environment:
    PATH: "{{ ovos_virtualenv_homebrew_path }}:{{ ansible_env.PATH | default('/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin') }}"
  when: ansible_facts.system == "Darwin"

- name: Persist tracked virtualenv package ownership (macOS)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_macos }}"
  when: ansible_facts.system == "Darwin"

- name: Ensure user local bin directory exists for build compatibility shims (macOS)
  ansible.builtin.file:
    path: "{{ ovos_installer_user_home }}/.local/bin"
    state: directory
    owner: "{{ ovos_installer_user }}"
    group: "{{ ovos_installer_group }}"
    mode: "0755"
  when: ansible_facts.system == "Darwin"

- name: Resolve swig binary path for fann2 builds (macOS)
  become: true
  become_user: "{{ ovos_installer_user }}"
  ansible.builtin.command:
    cmd: "which swig"
  register: ovos_virtualenv_macos_swig_bin
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ ovos_virtualenv_homebrew_path }}:{{ ansible_env.PATH | default('/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin') }}"
  when: ansible_facts.system == "Darwin"

- name: Ensure swig2.0 compatibility shim exists (macOS)
  ansible.builtin.file:
    src: "{{ ovos_virtualenv_macos_swig_bin.stdout | trim }}"
    dest: "{{ ovos_installer_user_home }}/.local/bin/swig2.0"
    state: link
    force: true
    owner: "{{ ovos_installer_user }}"
    group: "{{ ovos_installer_group }}"
  when:
    - ansible_facts.system == "Darwin"
    - (ovos_virtualenv_macos_swig_bin.stdout | default('') | trim | length) > 0

- name: Check Homebrew fann lib directory for compatibility
  ansible.builtin.stat:
    path: "{{ ovos_virtualenv_macos_fann_source_lib_dir }}"
  register: ovos_virtualenv_macos_fann_source_dir
  when:
    - ansible_facts.system == "Darwin"
    - ovos_virtualenv_macos_fann_source_lib_dir != ovos_virtualenv_macos_fann_target_lib_dir

- name: Discover Homebrew fann dylibs on macOS
  ansible.builtin.find:
    paths: "{{ ovos_virtualenv_macos_fann_source_lib_dir }}"
    patterns: "libdoublefann*.dylib"
    file_type: file
  register: ovos_virtualenv_macos_fann_dylibs
  when:
    - ansible_facts.system == "Darwin"
    - ovos_virtualenv_macos_fann_source_lib_dir != ovos_virtualenv_macos_fann_target_lib_dir
    - ovos_virtualenv_macos_fann_source_dir.stat.exists | default(false)

- name: Ensure fallback lib directory exists for fann build compatibility
  ansible.builtin.file:
    path: "{{ ovos_virtualenv_macos_fann_target_lib_dir }}"
    state: directory
    mode: "0755"
  when:
    - ansible_facts.system == "Darwin"
    - ovos_virtualenv_macos_fann_source_lib_dir != ovos_virtualenv_macos_fann_target_lib_dir
    - ovos_virtualenv_macos_fann_dylibs.matched | default(0) | int > 0

- name: Create fann compatibility symlinks for legacy build scripts
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ ovos_virtualenv_macos_fann_target_lib_dir }}/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ovos_virtualenv_macos_fann_dylibs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when:
    - ansible_facts.system == "Darwin"
    - ovos_virtualenv_macos_fann_source_lib_dir != ovos_virtualenv_macos_fann_target_lib_dir
    - ovos_virtualenv_macos_fann_dylibs.matched | default(0) | int > 0

- name: Handle fann package from AUR (Arch based only)
  become_user: "{{ ovos_installer_user }}"
  kewlfft.aur.aur:
    name: "{{ ovos_virtualenv_packages_arch_aur | default([]) }}"
    use: makepkg
  register: ovos_virtualenv_aur_package_install_result
  when: ansible_facts.os_family == "Archlinux"
  tags:
    - skip_ansible_lint

- name: Persist tracked virtualenv package ownership (Archlinux)
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_virtualenv_package_marker_path_linux }}"
  when: ansible_facts.os_family == "Archlinux"
