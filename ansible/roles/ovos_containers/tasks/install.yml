---
- name: Detect Docker CLI
  ansible.builtin.command:
    argv:
      - "{{ ovos_containers_docker_binary }}"
      - --version
  register: ovos_containers_docker_cli
  changed_when: false
  failed_when: false

- name: Detect Docker Compose v2 plugin
  ansible.builtin.command:
    argv:
      - "{{ ovos_containers_docker_binary }}"
      - compose
      - version
  register: ovos_containers_docker_compose_cli
  changed_when: false
  failed_when: false
  when: ovos_containers_docker_cli.rc == 0

- name: Determine whether Docker setup is required
  ansible.builtin.set_fact:
    ovos_containers_docker_setup_required: >-
      {{
        ovos_containers_docker_cli.rc != 0
        or (ovos_containers_docker_compose_cli.rc | default(1)) != 0
      }}
  changed_when: false

- name: Include setup-RedHat.yml
  ansible.builtin.import_tasks: setup-RedHat.yml
  when:
    - ansible_facts.os_family == "RedHat"
    - ovos_containers_docker_setup_required | bool

- name: Include setup-Debian.yml
  ansible.builtin.import_tasks: setup-Debian.yml
  when:
    - ansible_facts.os_family == "Debian"
    - ovos_containers_docker_setup_required | bool

- name: Include setup-Suse.yml
  ansible.builtin.import_tasks: setup-Suse.yml
  when:
    - ansible_facts.os_family == "Suse"
    - ovos_containers_docker_setup_required | bool

- name: Include setup-Arch.yml
  ansible.builtin.import_tasks: setup-Arch.yml
  when:
    - ansible_facts.os_family == "Archlinux"
    - ovos_containers_docker_setup_required | bool

- name: Include cgroup.yml
  ansible.builtin.import_tasks: cgroup.yml

- name: Include common.yml
  ansible.builtin.import_tasks: common.yml

- name: Include composer.yml
  ansible.builtin.import_tasks: composer.yml
