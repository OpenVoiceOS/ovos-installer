  when: ansible_facts.os_family == "RedHat"
  tags:
    - always

- name: Handle cpupower package on RedHat family
  ansible.builtin.dnf:
    name: "{{ ovos_performance_tuning_cpupower_packages_redhat }}"
    state: present
  register: ovos_performance_tuning_cpupower_install_result
  when: ansible_facts.os_family == "RedHat"
  tags:
    - always

- name: Persist tracked cpupower package ownership on RedHat family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
  when: ansible_facts.os_family == "RedHat"
  tags:
    - always

- name: Prepare cpupower package tracking on SUSE family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_performance_tuning_cpupower_packages_suse }}"
  when: ansible_facts.os_family == "Suse"
  tags:
    - always

- name: Handle cpupower package on SUSE family
  ansible.builtin.package:
    name: "{{ ovos_performance_tuning_cpupower_packages_suse }}"
    state: present
  register: ovos_performance_tuning_cpupower_install_result
  when: ansible_facts.os_family == "Suse"
  tags:
    - always

- name: Persist tracked cpupower package ownership on SUSE family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
  when: ansible_facts.os_family == "Suse"
  tags:
    - always

- name: Prepare cpupower package tracking on Arch family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_performance_tuning_cpupower_packages_arch }}"
  when: ansible_facts.os_family == "Archlinux"
  tags:
    - always

- name: Handle cpupower package on Arch family
  community.general.pacman:
    name: "{{ ovos_performance_tuning_cpupower_packages_arch }}"
    state: present
  register: ovos_performance_tuning_cpupower_install_result
  when: ansible_facts.os_family == "Archlinux"
  tags:
    - always

- name: Persist tracked cpupower package ownership on Arch family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
  when: ansible_facts.os_family == "Archlinux"
  tags:
    - always

- name: Check for existing CPU governor configuration
  ansible.builtin.stat:
    path: "{{ ovos_performance_tuning_cpu_governor_config_path }}"
  register: ovos_performance_tuning_cpu_governor_config

- name: Set existing CPU governor to "performance"
  ansible.builtin.lineinfile:
    path: "{{ ovos_performance_tuning_cpu_governor_config_path }}"
    regexp: "^CPU_DEFAULT_GOVERNOR="
    line: "CPU_DEFAULT_GOVERNOR=\"{{ ovos_performance_tuning_cpu_governor_value }}\""
  when: ovos_performance_tuning_cpu_governor_config.stat.exists | bool

- name: Copy cpu-governor systemd unit file
  ansible.builtin.copy:
    src: "{{ ovos_performance_tuning_cpu_governor_unit_src }}"
    dest: "{{ ovos_performance_tuning_cpu_governor_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload Systemd

- name: Flush handlers cpu-governor
  ansible.builtin.meta: flush_handlers

- name: Enable and start systemd cpu-governor unit
  ansible.builtin.systemd_service:
    name: "{{ ovos_performance_tuning_cpu_governor_unit_name }}"
    enabled: true
    force: true
    state: started
