---
- name: Prepare cpupower package tracking on Debian family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_prepare_linux.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
    ovos_installer_package_tracking_requested_packages: "{{ ovos_performance_tuning_cpupower_packages_debian }}"
  when: ansible_facts.os_family == "Debian"
  tags:
    - always

- name: Handle cpupower package on Debian family
  ansible.builtin.apt:
    name: "{{ ovos_performance_tuning_cpupower_packages_debian }}"
    install_recommends: false
    state: present
  register: ovos_performance_tuning_cpupower_install_result
  when: ansible_facts.os_family == "Debian"
  tags:
    - always

- name: Persist tracked cpupower package ownership on Debian family
  ansible.builtin.include_role:
    name: ovos_installer
    tasks_from: package_tracking_persist.yml
  vars:
    ovos_installer_package_tracking_marker_path: "{{ ovos_performance_tuning_cpupower_marker_path }}"
  when: ansible_facts.os_family == "Debian"
  tags:
    - always

- name: Prepare cpupower package tracking on RedHat family
  ansible.builtin.include_role:
    name: ovos_installer
