---
- name: Resolve tracked package ownership marker group
  ansible.builtin.set_fact:
    ovos_installer_package_tracking_marker_group: "{{ 'wheel' if ansible_facts.system == 'Darwin' else 'root' }}"
  changed_when: false

- name: Ensure tracked package ownership directory exists
  ansible.builtin.file:
    path: "{{ ovos_installer_package_tracking_marker_path | dirname }}"
    state: directory
    owner: "root"
    group: "{{ ovos_installer_package_tracking_marker_group }}"
    mode: "0755"
  when: (ovos_installer_package_tracking_tracked_packages | default([]) | length) > 0

- name: Persist tracked package ownership marker
  ansible.builtin.copy:
    dest: "{{ ovos_installer_package_tracking_marker_path }}"
    content: "{{ ovos_installer_package_tracking_tracked_packages | default([]) | to_nice_json }}\n"
    owner: "root"
    group: "{{ ovos_installer_package_tracking_marker_group }}"
    mode: "0644"
  when: (ovos_installer_package_tracking_tracked_packages | default([]) | length) > 0

- name: Remove empty tracked package ownership marker
  ansible.builtin.file:
    path: "{{ ovos_installer_package_tracking_marker_path }}"
    state: absent
  when: (ovos_installer_package_tracking_tracked_packages | default([]) | length) == 0
